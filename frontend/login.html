<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - Enersky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html" style="color: white; text-decoration: none;">Enersky</a></div>
        <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i> Meniu</button>
        <nav id="main-menu" class="nav-links">
            <ul>
                <li><a href="catalog.html">Catalog</a></li>
                <li><a href="#" id="nav-contact-btn">Contact</a></li>
            </ul>
        </nav>
        <div class="auth-section" style="display: flex; gap: 20px; align-items: center;">
            <a href="cart.html" style="color: white; text-decoration: none; font-size: 18px; font-weight: bold;">
                <i class="fas fa-shopping-cart"></i> Coșul meu
            </a>
            <a href="login.html" class="btn btn-primary">Autentificare</a>
        </div>
    </header>

    <main class="login-page-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">Login</button>
                <button class="tab-btn" id="tab-register">Înregistrare</button>
            </div>

            <form id="login-form" class="auth-form">
                <h2>Bine ai revenit!</h2>
                <p>Introdu datele pentru a accesa contul.</p>
                
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="nume@exemplu.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-pass">Parolă</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Ține-mă minte</label>
                    <a href="#" id="btn-forgot-password">Ai uitat parola?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Intră în cont</button>
            </form>

            <form id="register-form" class="auth-form hidden">
                <h2>Creează un cont</h2>
                <p>Alătură-te comunității Enersky.</p>
                
                <div class="input-group">
                    <label for="reg-name">Nume Complet</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Popescu Ion" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-type">Tip Utilizator</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-badge"></i>
                        <select id="reg-type" class="custom-select" required>
                            <option value="fizica">Persoană Fizică</option>
                            <option value="firma">Companie / Firmă</option>
                            <option value="distribuitor">Distribuitor (Necesită aprobare)</option>
                        </select>
                    </div>
                </div>

                <div id="company-data" class="hidden">
                    <div style="margin-bottom: 15px;">
                        <input type="text" id="reg-firma" placeholder="Numele Firmei" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
    
                    <div style="margin-bottom: 15px;">
                        <input type="text" id="reg-cui" placeholder="CUI" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="nume@exemplu.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-pass">Parolă</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-pass" placeholder="Minim 8 caractere" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-secondary btn-full">Creează Cont</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p><strong>Enersky SRL</strong></p>
            <p>Email: suport_enersky@gmail.com | Telefon: +(40)722688405</p>
            <p>Locatie: Bucuresti, Romania</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
